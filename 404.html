<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Our Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#1a1a2e;color:#f5f5f5;
  font-family:'Inter',sans-serif;text-align:center;padding:2rem;
  overflow:hidden;position:relative;
}
body::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%,#16213e44 0%,transparent 50%),
             radial-gradient(ellipse at 70% 80%,#e9456022 0%,transparent 50%);
  animation:drift 20s ease-in-out infinite alternate;z-index:0;
}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(-5%,3%)}}
.wrap{position:relative;z-index:1;max-width:560px}
.code{
  font-family:'Playfair Display',serif;font-size:clamp(7rem,20vw,12rem);font-weight:700;
  line-height:1;letter-spacing:-.04em;
  background:linear-gradient(135deg,#e94560,#16213e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:glow 4s ease-in-out infinite alternate;
}
@keyframes glow{0%{filter:brightness(1)}100%{filter:brightness(1.25)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);margin:.6rem 0 .4rem;color:#f5f5f5}
p{font-size:1.05rem;opacity:.75;line-height:1.6;margin-bottom:2rem}
.btn{
  display:inline-block;padding:.85rem 2.4rem;border-radius:60px;
  background:#e94560;color:#1a1a2e;font-weight:600;font-size:1rem;
  text-decoration:none;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 24px #e9456044;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px #e9456066}
.brand{margin-top:3rem;opacity:.45;font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you are looking for may have been moved or no longer exists.
     Let us guide you back.</p>
  <a href="/" class="btn">Back to Home</a>
  <div class="brand">Our Site — Ratings you can trust — verified psychic scores from independent testers.</div>
</div>
</body>
</html>
